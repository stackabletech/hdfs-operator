---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.fullname" . }}-clusterrole
  labels:
  {{- include "operator.labels" . | nindent 4 }}
rules:
  # For automatic cluster domain detection (reads kubelet config via the nodes/proxy API).
  - apiGroups:
      - ""
    resources:
      - nodes/proxy
    verbs:
      - get
  # Manage core workload resources created per HdfsCluster.
  # All resources are applied via Server-Side Apply (create + patch) and tracked for
  # orphan cleanup (list + delete). Resources watched by the controller also need watch.
  # - configmaps: rolegroup config maps; watched via .owns() and .watches()
  # - services: rolegroup headless and metrics services; watched via .owns()
  - apiGroups:
      - ""
    resources:
      - configmaps
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - watch
  # serviceaccounts are applied via SSA and tracked for orphan cleanup but not watched
  # by the controller.
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - create
      - delete
      - get
      - list
      - patch
  # rolebindings are applied via SSA and tracked for orphan cleanup but not watched
  # by the controller.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
    verbs:
      - create
      - delete
      - get
      - list
      - patch
  # statefulsets are applied via SSA, tracked for orphan cleanup, and watched via .owns().
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - watch
  # poddisruptionbudgets are applied via SSA and tracked for orphan cleanup but not watched
  # by the controller.
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      # Required to maintain the CRD. The operator needs to do this, as it needs to enter e.g. it's
      # generated certificate in the conversion webhook.
      {{- if .Values.maintenance.customResourceDefinitions.maintain }}
      - create
      - patch
      # Required for startup condition
      - list
      - watch
      {{- end }}
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
  # Read listener addresses to build the discovery ConfigMap for downstream clients.
  # Listeners are managed by the listener-operator; this operator only reads them.
  - apiGroups:
      - listeners.stackable.tech
    resources:
      - listeners
    verbs:
      - get
  # Watch HdfsClusters for reconciliation (list + watch via Controller::new(), get during
  # reconcile). Status is patched via a separate rule on the /status subresource.
  - apiGroups:
      - {{ include "operator.name" . }}.stackable.tech
    resources:
      - {{ include "operator.name" . }}clusters
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - {{ include "operator.name" . }}.stackable.tech
    resources:
      - {{ include "operator.name" . }}clusters/status
    verbs:
      - patch
  # Manage the hdfs-clusterrolebinding-nodes ClusterRoleBinding via Server-Side Apply.
  # This binding grants the HDFS product pods (topology provider) access to node and pod
  # information for rack awareness. Scoped to the specific ClusterRoleBinding by name.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
    resourceNames:
      - {{ include "operator.name" . }}-clusterrolebinding-nodes
    verbs:
      - create
      - patch
  # Allow binding the product ClusterRole when creating per-cluster RoleBindings.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
    verbs:
      - bind
    resourceNames:
      - {{ include "operator.name" . }}-clusterrole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.name" . }}-clusterrole
  labels:
  {{- include "operator.labels" . | nindent 4 }}
rules:
  # Read configuration and identity resources mounted or referenced by product pods.
  # - configmaps: HDFS configuration files
  # - secrets: TLS certificates and Kerberos keytabs (provided by secret-operator volumes)
  # - serviceaccounts: bound service account token projection
  # - pods: pod self-inspection (e.g. hostname resolution, ZooKeeper coordination)
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
      - serviceaccounts
      - pods
    verbs:
      - get
  # List pods for topology detection and peer discovery.
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - list
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
{{ if .Capabilities.APIVersions.Has "security.openshift.io/v1" }}
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - nonroot-v2
    verbs:
      - use
{{ end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.name" . }}-clusterrole-nodes
  labels:
  {{- include "operator.labels" . | nindent 4 }}
rules:
  # The topology provider (rack awareness) running inside HDFS pods queries pod, node, and
  # endpoint information to compute rack labels for DataNodes.
  # - pods: discover pod-to-node assignment for topology calculation; watched by pod informer
  # - nodes: read rack labels (e.g. topology.kubernetes.io/zone) from the node the pod runs on
  # - endpoints: map service endpoints to pod IPs for topology resolution
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
      - endpoints
    verbs:
      - get
      - list
      # needed for pod informer
      - watch
  # Read listener addresses so HDFS pods can resolve external access endpoints.
  - apiGroups:
      - listeners.stackable.tech
    resources:
      - listeners
    verbs:
      - get
      - list
  # needed to query the crd version (v1alpha1 etc.) before fetching listeners
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
