core-site.xml: |-
  <?xml version="1.0"?>
  <configuration>
    <property>
      <name>fs.defaultFS</name>
      <value>hdfs://hdfs/</value>
    </property>
    <property>
      <name>ha.zookeeper.quorum</name>
      <value>${env.ZOOKEEPER}</value>
    </property>
    <property>
      <name>hadoop.prometheus.endpoint.enabled</name>
      <value>true</value>
    </property>
    <property>
      <name>io.file.buffer.size</name>
      <value>131072</value>
    </property>
  </configuration>
format-namenodes.log4j.properties: |+
  log4j.rootLogger=INFO, CONSOLE, FILE

  log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
  log4j.appender.CONSOLE.Threshold=INFO
  log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
  log4j.appender.CONSOLE.layout.ConversionPattern=%d{ISO8601} %-5p %c{2} (%F:%M(%L)) - %m%n

  log4j.appender.FILE=org.apache.log4j.RollingFileAppender
  log4j.appender.FILE.Threshold=INFO
  log4j.appender.FILE.File=/stackable/log/format-namenodes/format-namenodes.log4j.xml
  log4j.appender.FILE.MaxFileSize=5MB
  log4j.appender.FILE.MaxBackupIndex=1
  log4j.appender.FILE.layout=org.apache.log4j.xml.XMLLayout

format-zookeeper.log4j.properties: |+
